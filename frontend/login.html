<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Nestra</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6c5dd3;
      --secondary: #463aa2;
      --gradient: linear-gradient(135deg, #6c5dd3, #463aa2);
      --accent: #f3f0ff;
      --glass: rgba(255, 255, 255, 0.1);
      --white: #fff;
      --dark: #2d2d39;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(120deg, #eae8ff, #f7f5ff);
      color: var(--dark);
      min-height: 100vh;
    }

    .topbar {
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.7);
      border-bottom: 1px solid rgba(108, 93, 211, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 2px 20px rgba(108, 93, 211, 0.08);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-toggle {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--dark);
    }

    .dropdown-menu {
      list-style: none;
      display: flex;
      gap: 1.5rem;
    }

    .dropdown-menu li a {
      text-decoration: none;
      color: var(--dark);
      font-weight: 600;
      font-size: 0.95rem;
      position: relative;
      transition: color 0.25s;
    }

    .dropdown-menu li a::after {
      content: "";
      position: absolute;
      width: 0;
      height: 2px;
      background: var(--gradient);
      left: 0;
      bottom: -4px;
      transition: 0.3s ease;
      border-radius: 2px;
    }

    .dropdown-menu li a:hover {
      color: var(--primary);
    }

    .dropdown-menu li a:hover::after {
      width: 100%;
    }

    .page-wrapper {
      min-height: calc(100vh - 70px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 60px rgba(108, 93, 211, 0.15);
      animation: slideUp 0.6s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: -80px;
      right: -80px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(108, 93, 211, 0.08), transparent 70%);
      border-radius: 50%;
    }

    .card-icon {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .card h2 {
      text-align: center;
      font-size: 1.9rem;
      color: var(--secondary);
      margin-bottom: 0.4rem;
      font-weight: 700;
    }

    .card .subtitle {
      text-align: center;
      color: #8885a8;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }

    .input-group label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #5c5a7a;
      margin-bottom: 6px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e5f5;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      background: #fafaff;
      transition: all 0.3s ease;
      color: var(--dark);
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(108, 93, 211, 0.1);
      transform: translateY(-1px);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Outfit', sans-serif;
      box-shadow: 0 8px 24px rgba(108, 93, 211, 0.3);
      margin-top: 0.5rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(108, 93, 211, 0.45);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .form-note {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.95rem;
      color: #8885a8;
    }

    .form-note a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .form-note a:hover {
      text-decoration: underline;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 1.5rem 0;
    }

    .divider span {
      flex: 1;
      height: 1px;
      background: #e8e5f5;
    }

    .divider p {
      font-size: 0.85rem;
      color: #b0adc8;
      white-space: nowrap;
    }

    footer {
      background: #ece9f7;
      padding: 1.2rem;
      text-align: center;
      font-size: 0.9rem;
      color: #5c5a75;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @media(max-width:768px) {
      .nav-toggle {
        display: block
      }

      .dropdown-menu {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        right: 20px;
        background: var(--white);
        padding: 16px;
        border-radius: 14px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        min-width: 180px
      }

      .dropdown-menu.show {
        display: flex
      }

      .card {
        padding: 36px 24px
      }
    }
  </style>
</head>

<body>
  <nav class="topbar">
    <div class="logo">Nestra</div>
    <div class="nav-toggle" onclick="toggleMenu()">☰</div>
    <ul class="dropdown-menu" id="dropdownMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="register.html">Register</a></li>
      <li><a href="survey.html">Survey</a></li>
      <li><a href="match_result.html">Match Result</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="help.html">Help</a></li>
    </ul>
  </nav>

  <div class="page-wrapper">
    <div class="card">
      <div class="card-icon">🔐</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to your Nestra account</p>
      <form action="../backend/login.php" method="POST">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required />
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-primary">Sign In →</button>
      </form>
      <p class="form-note">Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 Nestra | Empowering Intelligent, Inclusive Co-living</p>
  </footer>

  <style>
    #chatbot-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      background: var(--gradient);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 22px;
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(108, 93, 211, 0.45);
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      animation: fabPulse 2.5s infinite
    }

    #chatbot-fab:hover {
      transform: scale(1.08) translateY(-2px);
      box-shadow: 0 14px 36px rgba(108, 93, 211, 0.55);
      animation: none
    }

    @keyframes fabPulse {

      0%,
      100% {
        box-shadow: 0 8px 24px rgba(108, 93, 211, 0.45)
      }

      50% {
        box-shadow: 0 8px 32px rgba(108, 93, 211, 0.75)
      }
    }
  </style>
  <a id="chatbot-fab" href="chatbot.html" aria-label="Open Nexi Chatbot"><span
      style="font-size:1.4rem">🤖</span><span>Ask Nexi</span></a>
  <script>
    function toggleMenu() { document.getElementById("dropdownMenu").classList.toggle("show") }
    window.addEventListener("click", function (e) { const t = document.querySelector(".nav-toggle"), m = document.getElementById("dropdownMenu"); if (!t.contains(e.target) && !m.contains(e.target)) m.classList.remove("show") });
  </script>
</body>

</html>
